# ============================================================
# VLearning Backend — Docker Compose
# ============================================================
# Services:
#   api    → FastAPI (Uvicorn) on port 8000
#   redis  → Redis Alpine on port 6379
#   worker → Celery worker listening on Redis queue
# ============================================================
# Usage:
#   docker compose up --build        (start all)
#   docker compose up api redis      (without worker)
#   docker compose logs -f worker    (watch worker logs)
# ============================================================

services:
  # ── API Server ──────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    container_name: vlearning-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vlearning-net

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vlearning-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - vlearning-net

  # ── Celery Worker ───────────────────────────────────────
  worker:
    build:
      context: .
      target: worker
    container_name: vlearning-worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vlearning-net

volumes:
  redis-data:
    driver: local

networks:
  vlearning-net:
    driver: bridge
